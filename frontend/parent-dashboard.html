<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Dashboard | Living Spring School</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: #f0f2f5;
        }
        
        .header {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .logo h1 {
            font-size: 20px;
            color: #1e293b;
        }
        
        .logo span {
            color: #10b981;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logout-btn {
            background: #ef4444;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .welcome-card {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .welcome-card h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .children-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .child-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s;
            cursor: pointer;
        }
        
        .child-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .child-header {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .child-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .child-class {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .child-info {
            padding: 20px;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .info-label {
            font-weight: 600;
            color: #64748b;
        }
        
        .view-btn {
            width: 100%;
            padding: 12px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }
        
        .view-btn:hover {
            background: #059669;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .children-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>Living Spring <span>Adventist Academy</span></h1>
        </div>
        <div class="user-info">
            <span id="parentName">Parent</span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <div class="container">
        <div class="welcome-card">
            <h1>Welcome, <span id="welcomeName">Parent</span>! 👨‍👩‍👧</h1>
            <p>View your children's academic progress, report cards, and attendance</p>
        </div>
        
        <h2 style="margin-bottom: 20px;">👧 My Children</h2>
        
        <div id="childrenContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading your children's information...</p>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        const API_URL = '';
        let parentToken = null;
        let parent = null;
        
        // Check parent login
        parentToken = localStorage.getItem('parentToken');
        if (!parentToken) {
            window.location.href = 'parent-login.html';
        }
        
        parent = JSON.parse(localStorage.getItem('parent') || '{}');
        document.getElementById('parentName').innerText = parent.name || 'Parent';
        document.getElementById('welcomeName').innerText = parent.name || 'Parent';
        
        async function loadChildren() {
            try {
                const response = await fetch(API_URL + '/api/parent/children', {
                    headers: { 'Authorization': `Bearer ${parentToken}` }
                });
                const children = await response.json();
                
                const container = document.getElementById('childrenContainer');
                
                if (children.length === 0) {
                    container.innerHTML = '<div class="loading"><p>No children linked to your account. Please contact the school.</p></div>';
                    return;
                }
                
                let html = '<div class="children-grid">';
                children.forEach(child => {
                    html += `
                        <div class="child-card" onclick="viewChildReport(${child.id})">
                            <div class="child-header">
                                <div class="child-name">${escapeHtml(child.name)}</div>
                                <div class="child-class">${getClassName(child.class_level)}</div>
                            </div>
                            <div class="child-info">
                                <div class="info-row">
                                    <span class="info-label">Student ID:</span>
                                    <span>${child.student_id}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">House:</span>
                                    <span>${child.house || 'Not Assigned'}</span>
                                </div>
                                <div class="info-row">
                                    <span class="info-label">Gender:</span>
                                    <span>${child.gender || 'Not Specified'}</span>
                                </div>
                                <button class="view-btn">View Full Report →</button>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            } catch (error) {
                console.error('Error loading children:', error);
                document.getElementById('childrenContainer').innerHTML = '<div class="loading"><p>Error loading children. Please try again.</p></div>';
            }
        }
        
        function getClassName(classLevel) {
            const classes = {
                'KG1': 'KG 1', 'KG2': 'KG 2',
                'P1': 'Primary 1', 'P2': 'Primary 2', 'P3': 'Primary 3',
                'P4': 'Primary 4', 'P5': 'Primary 5', 'P6': 'Primary 6',
                'JHS1': 'JHS 1', 'JHS2': 'JHS 2', 'JHS3': 'JHS 3'
            };
            return classes[classLevel] || classLevel;
        }
        
        function viewChildReport(childId) {
            // Redirect to parent report card viewer
            window.location.href = `parent-report.html?childId=${childId}`;
        }
        
        function logout() {
            localStorage.removeItem('parentToken');
            localStorage.removeItem('parent');
            window.location.href = 'parent-login.html';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        loadChildren();
    </script>
</body>
</html>
