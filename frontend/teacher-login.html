<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login |GES Jasikan SDA Basic School</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 24px;
            color: #1e293b;
        }
        
        .logo span {
            color: #f59e0b;
        }
        
        .logo p {
            color: #64748b;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e293b;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #f59e0b;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .btn:hover {
            background: #d97706;
        }
        
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #64748b;
            text-decoration: none;
            font-size: 13px;
        }
        
        .back-link a:hover {
            color: #f59e0b;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>Teacher <span>Portal</span></h1>
            <p>GES JASIKAN SDA BASIC SCHOOL</p>
        </div>
        
        <div id="errorMsg" class="error-message"></div>
        
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="teacher@livingspring.edu.gh">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        
        <button class="btn" onclick="teacherLogin()">Login to Teacher Portal</button>
        
        <div class="back-link">
            <a href="login.html">← Back to Admin Login</a>
        </div>
    </div>

    <script>
        const API_URL = '';
        
        async function teacherLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    
    errorMsg.style.display = 'none';
    
    if (!email || !password) {
        errorMsg.innerText = 'Please enter email and password';
        errorMsg.style.display = 'block';
        return;
    }
    
    console.log('Attempting login with:', email, password);
    
    try {
        const response = await fetch(API_URL + '/api/teacher/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        console.log('Login response:', data);
        
        if (data.success) {
            localStorage.setItem('teacherToken', data.token);
            localStorage.setItem('teacher', JSON.stringify(data.teacher));
            window.location.href = 'teacher-dashboard.html';
        } else {
            errorMsg.innerText = data.message || 'Login failed';
            errorMsg.style.display = 'block';
        }
    } catch (error) {
        console.error('Login error:', error);
        errorMsg.innerText = 'Network error. Please try again.';
        errorMsg.style.display = 'block';
    }
}
    </script>
</body>
</html>
