<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher SBA Entry | Living Spring School</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: #f0f2f5;
        }
        
        .header {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .logo h1 {
            font-size: 20px;
            color: #1e293b;
        }
        
        .logo span {
            color: #f59e0b;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logout-btn {
            background: #ef4444;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .back-btn {
            background: #64748b;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .card h2 {
            margin-bottom: 20px;
        }
        
        .info-bar {
            background: #fef3c7;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .filter-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            align-items: flex-end;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .filter-group label {
            font-size: 11px;
            font-weight: 600;
            color: #1e293b;
            text-transform: uppercase;
        }
        
        .filter-group select, .filter-group input {
            padding: 10px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            min-width: 180px;
        }
        
        .btn {
            background: #f59e0b;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        
        .btn-success {
            background: #10b981;
        }
        
        .table-container {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        th {
            background: #f59e0b;
            color: white;
            padding: 12px 8px;
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
        }
        
        td:first-child {
            text-align: left;
            font-weight: 600;
        }
        
        tr:hover td {
            background: #f8fafc;
        }
        
        input {
            width: 70px;
            padding: 8px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            text-align: center;
        }
        
        .total-cell {
            font-weight: 700;
            color: #f59e0b;
            background: #fef3c7;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            input { width: 50px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>Living Spring <span>Adventist Academy</span></h1>
        </div>
        <div class="user-info">
            <span id="teacherName">Teacher</span>
            <a href="teacher-dashboard.html" class="back-btn">← Dashboard</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>📝 SBA Entry - School Based Assessment</h2>
            
            <div class="info-bar" id="classInfo">
                <span><strong>Class:</strong> <span id="displayClass">Loading...</span></span>
                <span><strong>Students:</strong> <span id="studentCount">0</span></span>
            </div>
            
            <div class="filter-bar">
                <div class="filter-group">
                    <label>Select Subject</label>
                    <select id="subjectSelect">
                        <option value="">-- Select Subject --</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Term</label>
                    <select id="termSelect">
                        <option value="1">Term 1</option>
                        <option value="2">Term 2</option>
                        <option value="3">Term 3</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Academic Year</label>
                    <input type="text" id="academicYear" value="2025/2026" style="width: 120px;">
                </div>
                <button class="btn" onclick="loadStudents()">Load Students</button>
            </div>
            
            <div id="marksTableContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Select a subject and click "Load Students"</p>
                </div>
            </div>
            
            <div class="action-buttons" id="actionButtons" style="display: none;">
                <button class="btn btn-success" onclick="saveAllMarks()">💾 Save All Marks</button>
                <button class="btn" onclick="loadStudents()">🔄 Refresh</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        const API_URL = '';
        let students = [];
        let subjects = [];
        let marksData = {};
        let teacherToken = null;
        let teacher = null;
        let currentClass = null;
        
        // Get class from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        currentClass = urlParams.get('class') || localStorage.getItem('teacherSelectedClass');
        
        if (!currentClass) {
            showToast('No class selected. Redirecting to dashboard...', 'error');
            setTimeout(() => {
                window.location.href = 'teacher-dashboard.html';
            }, 2000);
        }
        
        // Check teacher login
        teacherToken = localStorage.getItem('teacherToken');
        if (!teacherToken) {
            window.location.href = 'teacher-login.html';
        }
        
        teacher = JSON.parse(localStorage.getItem('teacher') || '{}');
        document.getElementById('teacherName').innerText = teacher.name || 'Teacher';
        
        // Display class name
        function getClassName(classLevel) {
            const classes = {
                'KG1': 'KG 1', 'KG2': 'KG 2',
                'P1': 'Primary 1', 'P2': 'Primary 2', 'P3': 'Primary 3',
                'P4': 'Primary 4', 'P5': 'Primary 5', 'P6': 'Primary 6',
                'JHS1': 'JHS 1', 'JHS2': 'JHS 2', 'JHS3': 'JHS 3'
            };
            return classes[classLevel] || classLevel;
        }
        
        document.getElementById('displayClass').innerText = getClassName(currentClass);
        
        // Load saved settings
        const savedYear = localStorage.getItem('academicYear');
        if (savedYear) {
            document.getElementById('academicYear').value = savedYear;
        }
        
        const savedTerm = localStorage.getItem('currentTerm');
        if (savedTerm) {
            document.getElementById('termSelect').value = savedTerm;
        }
        
        function getGrade(total) {
            if (total >= 80) return { grade: 'A', remark: 'Excellent' };
            if (total >= 70) return { grade: 'B', remark: 'Very Good' };
            if (total >= 60) return { grade: 'C', remark: 'Good' };
            if (total >= 50) return { grade: 'D', remark: 'Satisfactory' };
            if (total >= 40) return { grade: 'E', remark: 'Weak' };
            return { grade: 'F', remark: 'Fail' };
        }
        
        // Load subjects for the selected class
        async function loadSubjects() {
            try {
                console.log('Loading subjects for class:', currentClass);
                const response = await fetch(API_URL + `/api/teacher/subjects?class_level=${currentClass}`, {
                    headers: { 'Authorization': `Bearer ${teacherToken}` }
                });
                subjects = await response.json();
                console.log('Subjects loaded:', subjects);
                
                const subjectSelect = document.getElementById('subjectSelect');
                if (subjects.length === 0) {
                    subjectSelect.innerHTML = '<option value="">No subjects found</option>';
                } else {
                    let html = '<option value="">-- Select Subject --</option>';
                    const uniqueSubjects = new Map();
                    for (const s of subjects) {
                        if (!uniqueSubjects.has(s.name)) {
                            uniqueSubjects.set(s.name, s);
                        }
                    }
                    for (const s of uniqueSubjects.values()) {
                        html += `<option value="${s.id}">${s.name}</option>`;
                    }
                    subjectSelect.innerHTML = html;
                }
            } catch (error) {
                console.error('Error loading subjects:', error);
                document.getElementById('subjectSelect').innerHTML = '<option value="">Error loading subjects</option>';
                showToast('Error loading subjects', 'error');
            }
        }
        
        async function loadStudents() {
            const subjectId = document.getElementById('subjectSelect').value;
            const term = document.getElementById('termSelect').value;
            const academicYear = document.getElementById('academicYear').value;
            
            if (!subjectId) {
                showToast('Please select a subject', 'error');
                return;
            }
            
            document.getElementById('marksTableContainer').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading students...</p></div>';
            document.getElementById('actionButtons').style.display = 'none';
            
            try {
                // Load students for the selected class
                console.log('Loading students for class:', currentClass);
                const studentsRes = await fetch(API_URL + `/api/teacher/students?class_level=${currentClass}`, {
                    headers: { 'Authorization': `Bearer ${teacherToken}` }
                });
                students = await studentsRes.json();
                console.log('Students loaded:', students);
                
                document.getElementById('studentCount').innerText = students.length;
                
                if (students.length === 0) {
                    document.getElementById('marksTableContainer').innerHTML = '<div class="loading"><p>No students found in this class</p></div>';
                    return;
                }
                
                // Load existing marks
                const marksRes = await fetch(API_URL + `/api/sba?subject_id=${subjectId}&term=${term}&academic_year=${academicYear}`);
                const existingMarks = await marksRes.json();
                console.log('Existing marks loaded:', existingMarks);
                
                marksData = {};
                existingMarks.forEach(m => {
                    marksData[m.student_id] = m;
                });
                
                renderMarksTable();
                document.getElementById('actionButtons').style.display = 'flex';
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('marksTableContainer').innerHTML = '<div class="loading"><p>Error loading data: ' + error.message + '</p></div>';
                showToast('Error loading data: ' + error.message, 'error');
            }
        }
        
        function renderMarksTable() {
            let html = `
                <div class="table-container">
                    <table id="sbaTable">
                        <thead>
                            <tr>
                                <th>Student Name</th>
                                <th>Test (15)</th>
                                <th>Group Work (15)</th>
                                <th>Mid Term (15)</th>
                                <th>Project (15)</th>
                                <th>Sub Total (60)</th>
                                <th>Class Score (50%)</th>
                                <th>Exam (100)</th>
                                <th>Exam Score (50%)</th>
                                <th>Total (100%)</th>
                                <th>Grade</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            for (const student of students) {
                const existing = marksData[student.id] || {};
                const rowId = student.id;
                
                // Calculate totals
                const test1 = existing.test1 || 0;
                const groupWork = existing.group_work || 0;
                const midTerm = existing.mid_term || 0;
                const project = existing.project || 0;
                const exam = existing.exam || 0;
                
                const subTotal = test1 + groupWork + midTerm + project;
                const classScore = (subTotal / 60) * 50;
                const examScore = (exam / 100) * 50;
                const total = classScore + examScore;
                const gradeInfo = getGrade(total);
                
                html += `
                    <tr data-student-id="${student.id}" id="row_${rowId}">
                        <td><strong>${escapeHtml(student.name)}</strong></td>
                        <td><input type="number" id="test1_${rowId}" value="${test1}" min="0" max="15" step="0.5" onchange="updateTotals(${rowId})"></td>
                        <td><input type="number" id="group_${rowId}" value="${groupWork}" min="0" max="15" step="0.5" onchange="updateTotals(${rowId})"></td>
                        <td><input type="number" id="mid_${rowId}" value="${midTerm}" min="0" max="15" step="0.5" onchange="updateTotals(${rowId})"></td>
                        <td><input type="number" id="project_${rowId}" value="${project}" min="0" max="15" step="0.5" onchange="updateTotals(${rowId})"></td>
                        <td class="total-cell" id="subtotal_${rowId}">${Math.round(subTotal * 100) / 100}</td>
                        <td class="total-cell" id="classScore_${rowId}">${Math.round(classScore * 100) / 100}</td>
                        <td><input type="number" id="exam_${rowId}" value="${exam}" min="0" max="100" step="0.5" onchange="updateTotals(${rowId})"></td>
                        <td class="total-cell" id="examScore_${rowId}">${Math.round(examScore * 100) / 100}</td>
                        <td class="total-cell" id="total_${rowId}">${Math.round(total * 100) / 100}</td>
                        <td class="grade-cell" id="grade_${rowId}"><strong>${gradeInfo.grade}</strong></td>
                        <td id="remarks_${rowId}">${gradeInfo.remark}</td>
                    </tr>
                `;
            }
            
            html += `
                        </tbody>
                    </table>
                </div>
            `;
            
            document.getElementById('marksTableContainer').innerHTML = html;
        }
        
        function updateTotals(rowId) {
            const test1 = parseFloat(document.getElementById(`test1_${rowId}`)?.value) || 0;
            const groupWork = parseFloat(document.getElementById(`group_${rowId}`)?.value) || 0;
            const midTerm = parseFloat(document.getElementById(`mid_${rowId}`)?.value) || 0;
            const project = parseFloat(document.getElementById(`project_${rowId}`)?.value) || 0;
            const exam = parseFloat(document.getElementById(`exam_${rowId}`)?.value) || 0;
            
            const subTotal = test1 + groupWork + midTerm + project;
            const classScore = (subTotal / 60) * 50;
            const examScore = (exam / 100) * 50;
            const total = classScore + examScore;
            const gradeInfo = getGrade(total);
            
            const subtotalElem = document.getElementById(`subtotal_${rowId}`);
            const classScoreElem = document.getElementById(`classScore_${rowId}`);
            const examScoreElem = document.getElementById(`examScore_${rowId}`);
            const totalElem = document.getElementById(`total_${rowId}`);
            const gradeElem = document.getElementById(`grade_${rowId}`);
            const remarksElem = document.getElementById(`remarks_${rowId}`);
            
            if (subtotalElem) subtotalElem.innerHTML = Math.round(subTotal * 100) / 100;
            if (classScoreElem) classScoreElem.innerHTML = Math.round(classScore * 100) / 100;
            if (examScoreElem) examScoreElem.innerHTML = Math.round(examScore * 100) / 100;
            if (totalElem) totalElem.innerHTML = Math.round(total * 100) / 100;
            if (gradeElem) gradeElem.innerHTML = `<strong>${gradeInfo.grade}</strong>`;
            if (remarksElem) remarksElem.innerHTML = gradeInfo.remark;
        }
        
        async function saveAllMarks() {
            const subjectId = document.getElementById('subjectSelect').value;
            const term = document.getElementById('termSelect').value;
            const academicYear = document.getElementById('academicYear').value;
            
            if (!subjectId) {
                showToast('Please select a subject', 'error');
                return;
            }
            
            showToast('Saving marks...', 'info');
            
            let savedCount = 0;
            let errorCount = 0;
            
            for (const student of students) {
                const rowId = student.id;
                
                let test1 = parseFloat(document.getElementById(`test1_${rowId}`)?.value) || 0;
                let groupWork = parseFloat(document.getElementById(`group_${rowId}`)?.value) || 0;
                let midTerm = parseFloat(document.getElementById(`mid_${rowId}`)?.value) || 0;
                let project = parseFloat(document.getElementById(`project_${rowId}`)?.value) || 0;
                let exam = parseFloat(document.getElementById(`exam_${rowId}`)?.value) || 0;
                
                test1 = Math.round(test1 * 100) / 100;
                groupWork = Math.round(groupWork * 100) / 100;
                midTerm = Math.round(midTerm * 100) / 100;
                project = Math.round(project * 100) / 100;
                exam = Math.round(exam * 100) / 100;
                
                const subTotal = test1 + groupWork + midTerm + project;
                const classScore = (subTotal / 60) * 50;
                const examScore = (exam / 100) * 50;
                const total = classScore + examScore;
                const gradeInfo = getGrade(total);
                
                const markData = {
                    student_id: student.id,
                    subject_id: parseInt(subjectId),
                    term: parseInt(term),
                    academic_year: academicYear,
                    test1: test1,
                    group_work: groupWork,
                    mid_term: midTerm,
                    project: project,
                    exam: exam,
                    sub_total: subTotal,
                    class_score: classScore,
                    exam_score: examScore,
                    total: total,
                    grade: gradeInfo.grade,
                    remarks: gradeInfo.remark
                };
                
                try {
                    const checkRes = await fetch(API_URL + `/api/sba/check?student_id=${student.id}&subject_id=${subjectId}&term=${term}&academic_year=${academicYear}`);
                    const existing = await checkRes.json();
                    
                    let response;
                    if (existing.exists && existing.id) {
                        response = await fetch(API_URL + `/api/sba/${existing.id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(markData)
                        });
                    } else {
                        response = await fetch(API_URL + '/api/sba', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(markData)
                        });
                    }
                    
                    if (response.ok) {
                        savedCount++;
                    } else {
                        errorCount++;
                    }
                } catch (error) {
                    errorCount++;
                    console.error('Error saving student:', student.name, error);
                }
            }
            
            if (errorCount > 0) {
                showToast(`Saved ${savedCount} records, ${errorCount} errors`, 'error');
            } else {
                showToast(`✓ Successfully saved ${savedCount} records!`, 'success');
            }
            
            await loadStudents();
        }
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.backgroundColor = type === 'error' ? '#ef4444' : (type === 'info' ? '#3b82f6' : '#10b981');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        function logout() {
            localStorage.removeItem('teacherToken');
            localStorage.removeItem('teacher');
            localStorage.removeItem('teacherSelectedClass');
            window.location.href = 'teacher-login.html';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Initialize
        loadSubjects();
    </script>
</body>
</html>
