<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Card Data Entry | Living Spring School</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        body {
            background: #f0f2f5;
        }
        
        .header {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .logo h1 {
            font-size: 20px;
            color: #1e293b;
        }
        
        .logo span {
            color: #f59e0b;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .logout-btn {
            background: #ef4444;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        
        .back-btn {
            background: #64748b;
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .card h2 {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .info-bar {
            background: #fef3c7;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .filter-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            align-items: flex-end;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .filter-group label {
            font-size: 11px;
            font-weight: 600;
            color: #1e293b;
            text-transform: uppercase;
        }
        
        .filter-group select, .filter-group input {
            padding: 10px 15px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            min-width: 150px;
        }
        
        .btn {
            background: #f59e0b;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }
        
        .btn-success {
            background: #10b981;
        }
        
        .table-container {
            overflow-x: auto;
            max-height: 600px;
            overflow-y: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        
        th {
            background: #f59e0b;
            color: white;
            padding: 10px 6px;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        
        td {
            padding: 8px 6px;
            border-bottom: 1px solid #e2e8f0;
            text-align: center;
        }
        
        td:first-child {
            text-align: left;
            font-weight: 600;
        }
        
        tr:hover td {
            background: #f8fafc;
        }
        
        select, input {
            width: 100%;
            padding: 6px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 11px;
        }
        
        input {
            width: 80px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .filter-bar { flex-direction: column; }
            td, th { font-size: 10px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>Living Spring <span>Adventist Academy</span></h1>
        </div>
        <div class="user-info">
            <span id="teacherName">Teacher</span>
            <a href="teacher-dashboard.html" class="back-btn">← Dashboard</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>📋 Report Card Data Entry</h2>
            <p style="margin-bottom: 15px; color: #64748b;">Enter Personal Development, Attendance, Conduct, Interest, and Remarks for each student</p>
            
            <div class="info-bar" id="classInfo">
                <span><strong>Class:</strong> <span id="displayClass">Loading...</span></span>
                <span><strong>Term:</strong> <span id="displayTerm">Term 1</span></span>
                <span><strong>Academic Year:</strong> <span id="displayYear">2025/2026</span></span>
                <span><strong>Students:</strong> <span id="studentCount">0</span></span>
            </div>
            
            <div class="filter-bar">
                <div class="filter-group">
                    <label>Term</label>
                    <select id="termSelect" onchange="loadStudents()">
                        <option value="1">Term 1</option>
                        <option value="2">Term 2</option>
                        <option value="3">Term 3</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Academic Year</label>
                    <input type="text" id="academicYear" value="2025/2026" style="width: 120px;">
                </div>
                <button class="btn" onclick="loadStudents()">Load Students</button>
                <button class="btn btn-success" onclick="saveAllData()">💾 Save All Data to Database</button>
            </div>
            
            <div id="dataTableContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading students...</p>
                </div>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        const API_URL = '';
        let students = [];
        let teacherToken = null;
        let teacher = null;
        let currentClass = null;
        
        // Get class from URL parameter or localStorage
        const urlParams = new URLSearchParams(window.location.search);
        currentClass = urlParams.get('class') || localStorage.getItem('teacherSelectedClass');
        
        if (!currentClass) {
            showToast('No class selected. Redirecting to dashboard...', 'error');
            setTimeout(() => {
                window.location.href = 'teacher-dashboard.html';
            }, 2000);
        }
        
        // Check teacher login
        teacherToken = localStorage.getItem('teacherToken');
        if (!teacherToken) {
            window.location.href = 'teacher-login.html';
        }
        
        teacher = JSON.parse(localStorage.getItem('teacher') || '{}');
        document.getElementById('teacherName').innerText = teacher.name || 'Teacher';
        
        // Load saved term and year
        const savedTerm = localStorage.getItem('currentTerm');
        if (savedTerm) {
            document.getElementById('termSelect').value = savedTerm;
        }
        
        const savedYear = localStorage.getItem('academicYear');
        if (savedYear) {
            document.getElementById('academicYear').value = savedYear;
        }
        
        function getClassName(classLevel) {
            const classes = {
                'KG1': 'KG 1', 'KG2': 'KG 2',
                'P1': 'Primary 1', 'P2': 'Primary 2', 'P3': 'Primary 3',
                'P4': 'Primary 4', 'P5': 'Primary 5', 'P6': 'Primary 6',
                'JHS1': 'JHS 1', 'JHS2': 'JHS 2', 'JHS3': 'JHS 3'
            };
            return classes[classLevel] || classLevel;
        }
        
        document.getElementById('displayClass').innerText = getClassName(currentClass);
        
        function getPersonalDevTraits() {
            if (currentClass === 'KG1' || currentClass === 'KG2') {
                return [
                    'Leadership Ability',
                    'Basic Life Skills',
                    'Neatness',
                    'Sociability',
                    'Creativity & Initiative',
                    'Dependability',
                    'Recreation Work'
                ];
            } else if (currentClass === 'P1' || currentClass === 'P2' || currentClass === 'P3' ||
                       currentClass === 'P4' || currentClass === 'P5' || currentClass === 'P6') {
                return [
                    'Leadership Ability',
                    'Basic Life Skills',
                    'Neatness',
                    'Sociability',
                    'Creativity & Initiative',
                    'Dependability',
                    'Recreation Work',
                    'Work Habits'
                ];
            } else {
                return [
                    'Basic Life Skills',
                    'Social Development Skills',
                    'Outdoor Activity',
                    'Work Habits'
                ];
            }
        }
        
        // Dropdown options
        const gradeOptions = ['A', 'B', 'C', 'D', 'E', 'F'];
        const conductOptions = ['Excellent', 'Very Good', 'Good', 'Fair', 'Poor'];
        const interestOptions = ['Very Interested', 'Interested', 'Fairly Interested', 'Not Interested'];
        const remarkOptions = [
            'Excellent performance, keep it up!',
            'Very good progress, can do better',
            'Good effort, aim higher',
            'Satisfactory, needs more effort',
            'Weak performance, requires attention',
            'Poor performance, see teacher',
            'Outstanding work!',
            'Well done, keep the good work!',
            'Improvement needed in some areas',
            'Excellent participation in class'
        ];
        
        async function loadStudents() {
            const term = document.getElementById('termSelect').value;
            const academicYear = document.getElementById('academicYear').value;
            
            document.getElementById('displayTerm').innerText = term === '1' ? 'Term 1' : (term === '2' ? 'Term 2' : 'Term 3');
            document.getElementById('displayYear').innerText = academicYear;
            
            document.getElementById('dataTableContainer').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading students...</p></div>';
            
            try {
                // Load students from database
                const studentsRes = await fetch(API_URL + `/api/teacher/students?class_level=${currentClass}`, {
                    headers: { 'Authorization': `Bearer ${teacherToken}` }
                });
                students = await studentsRes.json();
                
                document.getElementById('studentCount').innerText = students.length;
                
                if (students.length === 0) {
                    document.getElementById('dataTableContainer').innerHTML = '<div class="loading"><p>No students found in this class</p></div>';
                    return;
                }
                
                // Load existing saved data from DATABASE (not localStorage)
                await loadSavedDataFromDatabase(term, academicYear);
                
            } catch (error) {
                console.error('Error loading students:', error);
                document.getElementById('dataTableContainer').innerHTML = '<div class="loading"><p>Error loading students</p></div>';
                showToast('Error loading students', 'error');
            }
        }
        
        // NEW FUNCTION: Load saved data from database
        async function loadSavedDataFromDatabase(term, academicYear) {
            const savedDataMap = {};
            
            for (const student of students) {
                try {
                    const response = await fetch(API_URL + `/api/report-card-data?student_id=${student.id}&term=${term}&academic_year=${academicYear}`, {
                        headers: { 'Authorization': `Bearer ${teacherToken}` }
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        if (data && Object.keys(data).length > 0) {
                            savedDataMap[student.id] = data;
                        }
                    }
                } catch (error) {
                    console.error('Error loading saved data for student', student.id, error);
                }
            }
            
            renderDataTable(savedDataMap);
        }
        
        function renderDataTable(savedDataMap = {}) {
            const traits = getPersonalDevTraits();
            const term = document.getElementById('termSelect').value;
            const academicYear = document.getElementById('academicYear').value;
            
            let html = `
                <div class="table-container">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th rowspan="2">Student Name</th>
                                <th colspan="${traits.length}">Personal Development</th>
                                <th rowspan="2">Attendance (Present/Total)</th>
                                <th rowspan="2">Promoted To</th>
                                <th rowspan="2">Conduct</th>
                                <th rowspan="2">Interest</th>
                                <th rowspan="2">Class Teacher's Remarks</th>
                                <th rowspan="2">Headteacher's Remarks</th>
                            </tr>
                            <tr>
                                ${traits.map(t => `<th>${t}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            for (const student of students) {
                const studentData = savedDataMap[student.id] || {};
                const studentKey = student.id;
                
                // Personal Development cells
                let pdCells = '';
                for (let i = 0; i < traits.length; i++) {
                    const savedValue = studentData[`pd_${i}`] || '';
                    pdCells += `
                        <td>
                            <select id="pd_${studentKey}_${i}" data-student="${studentKey}" data-trait="${i}">
                                <option value="">--</option>
                                ${gradeOptions.map(g => `<option value="${g}" ${savedValue === g ? 'selected' : ''}>${g}</option>`).join('')}
                            </select>
                        </td>
                    `;
                }
                
                // Calculate default promoted to (next class)
                const nextClass = getNextClass(currentClass);
                
                html += `
                    <tr>
                        <td><strong>${escapeHtml(student.name)}</strong></td>
                        ${pdCells}
                        <td>
                            <input type="number" id="attendance_present_${studentKey}" value="${studentData.attendance_present || ''}" placeholder="Present" style="width:60px;"> / 
                            <input type="number" id="attendance_total_${studentKey}" value="${studentData.attendance_total || ''}" placeholder="Total" style="width:60px;">
                        </td>
                        <td>
                            <input type="text" id="promoted_to_${studentKey}" value="${studentData.promoted_to || nextClass}" placeholder="Next Class" style="width:100px;">
                        </td>
                        <td>
                            <select id="conduct_${studentKey}">
                                <option value="">-- Select --</option>
                                ${conductOptions.map(c => `<option value="${c}" ${studentData.conduct === c ? 'selected' : ''}>${c}</option>`).join('')}
                            </select>
                        </td>
                        <td>
                            <select id="interest_${studentKey}">
                                <option value="">-- Select --</option>
                                ${interestOptions.map(i => `<option value="${i}" ${studentData.interest === i ? 'selected' : ''}>${i}</option>`).join('')}
                            </select>
                        </td>
                        <td>
                            <select id="teacher_remarks_${studentKey}">
                                <option value="">-- Select --</option>
                                ${remarkOptions.map(r => `<option value="${r}" ${studentData.teacher_remarks === r ? 'selected' : ''}>${r}</option>`).join('')}
                            </select>
                        </td>
                        <td>
                            <select id="headteacher_remarks_${studentKey}">
                                <option value="">-- Select --</option>
                                ${remarkOptions.map(r => `<option value="${r}" ${studentData.headteacher_remarks === r ? 'selected' : ''}>${r}</option>`).join('')}
                            </select>
                        </td>
                    </tr>
                `;
            }
            
            html += `
                        </tbody>
                    </table>
                </div>
            `;
            
            document.getElementById('dataTableContainer').innerHTML = html;
        }
        
        function getNextClass(currentClass) {
            const classOrder = ['KG1', 'KG2', 'P1', 'P2', 'P3', 'P4', 'P5', 'P6', 'JHS1', 'JHS2', 'JHS3'];
            const currentIndex = classOrder.indexOf(currentClass);
            if (currentIndex !== -1 && currentIndex < classOrder.length - 1) {
                const next = classOrder[currentIndex + 1];
                const classes = {
                    'KG1': 'KG 2', 'KG2': 'Primary 1',
                    'P1': 'Primary 2', 'P2': 'Primary 3', 'P3': 'Primary 4',
                    'P4': 'Primary 5', 'P5': 'Primary 6', 'P6': 'JHS 1',
                    'JHS1': 'JHS 2', 'JHS2': 'JHS 3', 'JHS3': 'Completed'
                };
                return classes[currentClass] || next;
            }
            return 'Completed';
        }
        
        // UPDATED: Save to DATABASE instead of localStorage
        async function saveAllData() {
            const term = document.getElementById('termSelect').value;
            const academicYear = document.getElementById('academicYear').value;
            const traits = getPersonalDevTraits();
            
            showToast('Saving to database...', 'info');
            
            let savedCount = 0;
            let errorCount = 0;
            
            for (const student of students) {
                const studentKey = student.id;
                
                // Build the data object for this student
                const studentData = {
                    student_id: student.id,
                    class_level: currentClass,
                    term: parseInt(term),
                    academic_year: academicYear,
                    attendance_present: document.getElementById(`attendance_present_${studentKey}`)?.value || '',
                    attendance_total: document.getElementById(`attendance_total_${studentKey}`)?.value || '',
                    promoted_to: document.getElementById(`promoted_to_${studentKey}`)?.value || '',
                    conduct: document.getElementById(`conduct_${studentKey}`)?.value || '',
                    interest: document.getElementById(`interest_${studentKey}`)?.value || '',
                    teacher_remarks: document.getElementById(`teacher_remarks_${studentKey}`)?.value || '',
                    headteacher_remarks: document.getElementById(`headteacher_remarks_${studentKey}`)?.value || ''
                };
                
                // Add Personal Development grades (pd_0, pd_1, etc.)
                for (let i = 0; i < traits.length; i++) {
                    const select = document.getElementById(`pd_${studentKey}_${i}`);
                    if (select) {
                        studentData[`pd_${i}`] = select.value;
                    }
                }
                
                try {
                    const response = await fetch(API_URL + '/api/report-card-data', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${teacherToken}`
                        },
                        body: JSON.stringify(studentData)
                    });
                    
                    if (response.ok) {
                        savedCount++;
                    } else {
                        errorCount++;
                        const errorData = await response.json();
                        console.error('Error saving student', student.id, errorData);
                    }
                } catch (error) {
                    console.error('Network error for student', student.id, error);
                    errorCount++;
                }
            }
            
            if (errorCount > 0) {
                showToast(`✅ Saved ${savedCount} students, ❌ ${errorCount} errors`, 'error');
            } else {
                showToast(`✅ Successfully saved all ${savedCount} students to the database!`, 'success');
            }
        }
        
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            if (type === 'error') {
                toast.style.backgroundColor = '#ef4444';
            } else if (type === 'info') {
                toast.style.backgroundColor = '#3b82f6';
            } else {
                toast.style.backgroundColor = '#10b981';
            }
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        function logout() {
            localStorage.removeItem('teacherToken');
            localStorage.removeItem('teacher');
            localStorage.removeItem('teacherSelectedClass');
            window.location.href = 'teacher-login.html';
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Initialize
        loadStudents();
    </script>
</body>
</html>
